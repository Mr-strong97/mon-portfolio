name: Build and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-publish
  cancel-in-progress: true

jobs:
  build-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish build assets to repository root
        run: |
          rm -rf assets
          mkdir -p assets
          cp dist/assets/* assets/
          find dist -maxdepth 1 -type f ! -name 'index.html' -exec cp {} . \;

      - name: Commit published assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets ia.jpg my1.jpg my2.jpg mon_cv.pdf
          if git diff --cached --quiet; then
            echo "No generated asset changes to commit."
            exit 0
          fi
          git commit -m "Publish generated site assets"
          git push origin HEAD:main
